<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raysh App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter, sans-serif;
  background:linear-gradient(180deg,#f8fafc,#e2e8f0);
  color:#0f172a;
  scroll-behavior:smooth;
}

/* DARK MODE */
.dark{
  background:#020617;
  color:#e2e8f0;
}

nav{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:14px 24px;
  z-index:100;
  display:flex;
  justify-content:center;
}

.dark nav{background:rgba(0,0,0,0.6)}

nav h2{
  font-family:Orbitron;
  font-size:20px;
  color:#0ea5e9;
  letter-spacing:1px;
}

/* SECTION */
section{
  padding:100px 20px 70px;
  text-align:center;
  max-width:900px;
  margin:auto;
}

/* LOGO */
.logo{
  width:100px;
  border-radius:18px;
  margin-bottom:25px;
}

/* HEADING */
h1{
  font-size:38px;
  font-weight:600;
  margin-bottom:10px;
  letter-spacing:-1px;
}

/* TEXT */
p{
  color:#64748b;
  font-size:16px;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:14px 32px;
  background:#0ea5e9;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:all .3s ease;
  box-shadow:0 8px 20px rgba(14,165,233,0.25);
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 25px rgba(14,165,233,0.35);
}

.btn:active{
  transform:scale(0.97);
}

/* CARD */
.card{
  background:white;
  border:1px solid #e2e8f0;
  padding:18px;
  border-radius:12px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.dark .card{
  background:#0f172a;
}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:18px;
  margin-top:30px;
}

/* CONTACT */
.contact-grid{
  display:flex;
  gap:18px;
  justify-content:center;
  margin-top:25px;
}

.contact-box{
  background:white;
  border-radius:12px;
  padding:18px;
  width:120px;
  text-decoration:none;
  color:#0ea5e9;
  font-weight:600;
  transition:.3s;
  border:1px solid #e2e8f0;
}

.contact-box:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* TOGGLE */
.toggle{
  position:fixed;
  top:70px;
  right:15px;
  background:#0ea5e9;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#0ea5e9;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

/* BADGE */
.badge{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0ea5e9;
  color:white;
  padding:8px 12px;
  border-radius:20px;
  font-size:11px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  font-size:12px;
  color:#94a3b8;
}
</style>
</head><body>

<nav>
<h2>Raysh</h2>
</nav>

<div class="toggle" onclick="toggleMode()">🌙 Mode</div>

<section>
<img src="logo.jpeg" class="logo">
<h1 id="typing"></h1>
<p>Fast. Secure. Designed for performance lovers.</p>

<a href="app.apk" download="RAYSH.apk">
<button class="btn" onclick="showPopup()">Download App</button>
</a>
</section>

<section>
<h1>Why Raysh?</h1>
<div class="features">
<div class="card">⚡ Blazing Speed</div>
<div class="card">🔒 Privacy First</div>
<div class="card">🎮 Premium UI</div>
<div class="card">🌐 Smart Sync</div>
</div>
</section>

<section class="contact">
<h1>Contact Support</h1>
<div class="contact-grid">
<a href="mailto:raysh.official4971@gmail.com" class="contact-box">Email</a>
<a href="https://instagram.com/raysh_4971" class="contact-box">Instagram</a>
</div>
</section>

<div class="popup" id="popup">App Download Started 🚀</div>
<div class="badge">LIVE USERS: 2,184</div>

<footer>© 2026 Raysh App</footer>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}

function showPopup(){
  let p=document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}

let text="Experience The Future With Raysh";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,40);
  }
}
typing();
</script>

</body>
</html>
